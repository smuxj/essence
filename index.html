<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prix carburant &#8212; Fontainebleau</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #e4e2da;
    --text: #1a1a18;
    --muted: #6b6b67;
    --green: #2d7a4f;
    --green-bg: #eaf3de;
    --amber: #854f0b;
    --amber-bg: #faeeda;
    --red: #a32d2d;
    --red-bg: #fcebeb;
    --accent: #185fa5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --surface: #252523; --border: #3a3a36;
      --text: #f0ede6; --muted: #9a9a95;
      --green: #97c459; --green-bg: #173404;
      --amber: #ef9f27; --amber-bg: #412402;
      --red: #f09595; --red-bg: #501313;
      --accent: #85b7eb;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 4rem; }
  header { padding: 2rem 1.5rem 1.25rem; max-width: 1100px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  h1 { font-size: clamp(1.3rem, 3.5vw, 1.9rem); font-weight: 600; letter-spacing: -0.02em; line-height: 1.15; }
  h1 span { color: var(--muted); font-weight: 400; font-size: 0.85em; }
  #updated { font-size: 0.78rem; color: var(--muted); text-align: right; line-height: 1.6; }

  .controls { max-width: 1100px; margin: 0 auto 1rem; padding: 0 1.5rem; display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
  .controls label { font-size: 0.82rem; color: var(--muted); }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 0.85rem; cursor: pointer; outline: none; }
  select:hover { border-color: var(--accent); }

  .rayon-wrap { display: flex; align-items: center; gap: 8px; }
  .rayon-wrap input[type=range] { width: 110px; accent-color: var(--accent); cursor: pointer; }
  .rayon-val { font-size: 0.85rem; font-weight: 500; min-width: 40px; }
  .ville-search-wrap { position: relative; display: flex; align-items: center; gap: 4px; }
  #ville-input { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 0.4rem 0.7rem; font-size: 0.85rem; outline: none; width: 180px; }
  #ville-input:focus { border-color: var(--accent); }
  #ville-suggestions { position: absolute; top: calc(100% + 4px); left: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; z-index: 1000; min-width: 220px; box-shadow: 0 4px 16px rgba(0,0,0,.12); display: none; }
  #ville-suggestions div { padding: 0.5rem 0.8rem; font-size: 0.83rem; cursor: pointer; }
  #ville-suggestions div:hover { background: var(--bg); }
  #ville-reset { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 4px; display: none; }

  .pill { display: inline-flex; align-items: center; padding: 0.28rem 0.65rem; border-radius: 99px; font-size: 0.75rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--muted); user-select: none; transition: all .12s; }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill-group { display: flex; gap: 0.35rem; flex-wrap: wrap; }

  .main-layout { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 380px; gap: 1.25rem; }
  @media (max-width: 820px) { .main-layout { grid-template-columns: 1fr; } }

  .stats { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .stat-card { flex: 1; min-width: 120px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.8rem 1rem; }
  .stat-card .lbl { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .val { font-size: 1.25rem; font-weight: 600; letter-spacing: -0.02em; }
  .stat-card.best .val { color: var(--green); }
  .stat-card .sub { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

  .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; background: var(--surface); font-size: 0.855rem; }
  thead tr { background: var(--bg); border-bottom: 1px solid var(--border); }
  th { padding: 0.65rem 0.9rem; text-align: left; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); white-space: nowrap; }
  td { padding: 0.65rem 0.9rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg); }
  tr.best-deal td { background: var(--green-bg); }
  .prix-val { font-weight: 600; font-variant-numeric: tabular-nums; }
  .prix-val.lowest { color: var(--green); }
  .badge { display: inline-block; padding: 1px 7px; border-radius: 99px; font-size: 0.68rem; font-weight: 600; background: var(--green-bg); color: var(--green); }
  .age { font-size: 0.72rem; color: var(--muted); }
  .ville-cell { line-height: 1.3; }
  .ville-cell .adr { font-size: 0.72rem; color: var(--muted); }
  .maps-link { color: var(--accent); text-decoration: none; font-size: 0.76rem; white-space: nowrap; }
  .maps-link:hover { text-decoration: underline; }

  #map { height: 480px; border-radius: 12px; border: 1px solid var(--border); z-index: 0; position: sticky; top: 1rem; }
  @media (max-width: 820px) { #map { height: 300px; position: static; } }

  .state-msg { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.9rem; }
  #loading { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 3rem; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div>
    <h1>&#9981; Prix carburant <span>&#8212; Fontainebleau &amp; alentours</span></h1>
  </div>
  <div id="updated">Chargement...</div>
</header>

<div class="controls">
  <label>Carburant</label>
  <div class="pill-group" id="fuel-pills"></div>

  <label style="margin-left:0.5rem">Rayon</label>
  <div class="rayon-wrap">
    <input type="range" id="rayon-slider" min="5" max="50" step="5" value="25">
    <span class="rayon-val" id="rayon-label">25 km</span>
  </div>

  <label style="margin-left:0.5rem">Ville</label>
  <div class="ville-search-wrap">
    <input type="text" id="ville-input" placeholder="Ex: Melun..." autocomplete="off">
    <button id="ville-reset" title="Reinitialiser">&#x2715;</button>
    <div id="ville-suggestions"></div>
  </div>

  <label style="margin-left:0.5rem">Tri</label>
  <select id="sort-select">
    <option value="prix">Prix/L</option>
    <option value="ville">Ville (A-Z)</option>
  </select>
</div>

<div class="main-layout">
  <div>
    <div class="stats" id="stats-bar"></div>
    <div id="loading"><div class="spinner"></div>&nbsp;Chargement...</div>
    <div class="table-wrap" id="table-wrap" style="display:none">
      <table id="main-table">
        <thead>
          <tr>
            <th>Ville / Adresse</th>
            <th>Prix/L</th>
            <th>Maj</th>
            <th>Aller</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="empty-msg" class="state-msg" style="display:none">Aucune station trouvee pour ce carburant dans ce rayon.</div>
  </div>
  <div>
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var FUELS = ["Gazole","SP95","SP98","E10","E85","GPLc"];
var LABELS = {Gazole:"Gazole",SP95:"SP95",SP98:"SP98",E10:"E10",E85:"E85",GPLc:"GPL"};
var allData = null;
var activeFuel = "Gazole";
var sortBy = "prix";
var rayonKm = 25;
var map = null;
var markers = [];
var markerIndex = {};

var HOME_LAT = 48.4047;
var HOME_LON = 2.7014;
var centreLat = HOME_LAT;
var centreLon = HOME_LON;
var centreLabel = "Fontainebleau";
var centreMarker = null;
var geocodeTimer = null;

function haversine(lat1, lon1, lat2, lon2) {
  var R = 6371;
  var dLat = (lat2 - lat1) * Math.PI / 180;
  var dLon = (lon2 - lon1) * Math.PI / 180;
  var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateCentreMarker() {
  if (centreMarker) { map.removeLayer(centreMarker); centreMarker = null; }
}

function geocode(query, callback) {
  var url = "https://nominatim.openstreetmap.org/search?format=json&limit=5&countrycodes=fr&q=" + encodeURIComponent(query);
  fetch(url, {headers: {"Accept-Language": "fr"}})
    .then(function(r) { return r.json(); })
    .then(callback)
    .catch(function() { callback([]); });
}

function setupVilleSearch() {
  var input = document.getElementById("ville-input");
  var sugg = document.getElementById("ville-suggestions");
  var reset = document.getElementById("ville-reset");

  input.addEventListener("input", function() {
    var q = input.value.trim();
    reset.style.display = q ? "inline" : "none";
    clearTimeout(geocodeTimer);
    if (q.length < 2) { sugg.style.display = "none"; return; }
    geocodeTimer = setTimeout(function() {
      geocode(q, function(results) {
        sugg.innerHTML = "";
        if (!results.length) { sugg.style.display = "none"; return; }
        results.forEach(function(r) {
          var d = document.createElement("div");
          var parts = r.display_name.split(",");
          var city = parts[0].trim();
          var postcode = "";
          for (var pi = 0; pi < parts.length; pi++) {
            var p = parts[pi].trim();
            if (/^\d{5}$/.test(p)) { postcode = p; break; }
          }
          d.textContent = city + (postcode ? " (" + postcode + ")" : "");
          d.addEventListener("click", function() {
            centreLat = parseFloat(r.lat);
            centreLon = parseFloat(r.lon);
            centreLabel = r.display_name.split(",")[0];
            input.value = centreLabel;
            sugg.style.display = "none";
            updateCentreMarker();
            map.setView([centreLat, centreLon], 11);
            renderAll();
          });
          sugg.appendChild(d);
        });
        sugg.style.display = "block";
      });
    }, 350);
  });

  reset.addEventListener("click", function() {
    centreLat = HOME_LAT;
    centreLon = HOME_LON;
    centreLabel = "Fontainebleau";
    input.value = "";
    reset.style.display = "none";
    sugg.style.display = "none";
    updateCentreMarker();
    map.setView([centreLat, centreLon], 11);
    renderAll();
  });

  document.addEventListener("click", function(e) {
    if (!e.target.closest(".ville-search-wrap")) sugg.style.display = "none";
  });
}

function initMap() {
  map = L.map("map").setView([HOME_LAT, HOME_LON], 11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors",
    maxZoom: 18
  }).addTo(map);
  updateCentreMarker();
}

function colorForRank(i, total) {
  if (i === 0) return "#2d7a4f";
  if (i < total * 0.33) return "#639922";
  if (i < total * 0.66) return "#854f0b";
  return "#a32d2d";
}

function updateMarkers(sorted) {
  markers.forEach(function(m) { map.removeLayer(m); });
  markers = [];
  markerIndex = {};
  var total = sorted.length;
  sorted.forEach(function(s, i) {
    var color = colorForRank(i, total);
    var m = L.circleMarker([s.lat, s.lon], {
      radius: i === 0 ? 10 : 7,
      color: color, fillColor: color, fillOpacity: 0.85, weight: 2
    });
    var prix = s._p ? s._p.toFixed(3) + " EUR" : "N/A";
    m.bindPopup(
      "<strong>" + (s.ville || s.cp) + "</strong><br>" +
      (s.adresse ? s.adresse + "<br>" : "") +
      activeFuel + " : <strong>" + prix + "</strong><br>" +
      "<a href=\"https://www.google.com/maps/dir/" + encodeURIComponent(centreLabel) + "/" + s.lat + "," + s.lon + "\" target=\"_blank\">Y aller</a>"
    );
    m.addTo(map);
    markers.push(m);
    markerIndex[s.lat + "," + s.lon] = m;
  });
}

function buildPills() {
  var wrap = document.getElementById("fuel-pills");
  wrap.innerHTML = "";
  FUELS.forEach(function(f) {
    var p = document.createElement("button");
    p.className = "pill" + (f === activeFuel ? " active" : "");
    p.textContent = LABELS[f];
    p.onclick = function() { activeFuel = f; renderAll(); };
    wrap.appendChild(p);
  });
}

function getRows() {
  if (!allData) return [];
  return allData.stations
    .filter(function(s) {
      return s.prix[activeFuel] && haversine(centreLat, centreLon, s.lat, s.lon) <= rayonKm;
    })
    .map(function(s) {
      var o = Object.assign({}, s);
      o._p = s.prix[activeFuel].prix;
      o._age = s.prix[activeFuel].age_h;
      o._dist = haversine(centreLat, centreLon, s.lat, s.lon);
      return o;
    });
}

function renderStats(rows) {
  var bar = document.getElementById("stats-bar");
  bar.innerHTML = "";
  if (!rows.length) return;
  var cheapest = rows.reduce(function(a, b) { return a._p < b._p ? a : b; });
  var avg = rows.reduce(function(s, r) { return s + r._p; }, 0) / rows.length;
  var cards = [
    { lbl: "Prix le plus bas", val: cheapest._p.toFixed(3) + " EUR", sub: cheapest.ville || cheapest.cp, cls: "best" },
    { lbl: "Prix moyen", val: avg.toFixed(3) + " EUR", sub: rows.length + " stations", cls: "" },
    { lbl: "Zone", val: centreLabel, sub: "rayon " + rayonKm + " km", cls: "" }
  ];
  cards.forEach(function(c) {
    var d = document.createElement("div");
    d.className = "stat-card " + c.cls;
    d.innerHTML = "<div class=\"lbl\">" + c.lbl + "</div><div class=\"val\">" + c.val + "</div><div class=\"sub\">" + c.sub + "</div>";
    bar.appendChild(d);
  });
}

function fmtAge(h) {
  if (h < 0) return "?";
  if (h < 1) return "< 1h";
  if (h < 48) return Math.round(h) + "h";
  return (h/24).toFixed(1) + "j";
}

function renderTable(rows) {
  var tbody = document.getElementById("tbody");
  var wrap = document.getElementById("table-wrap");
  var empty = document.getElementById("empty-msg");
  tbody.innerHTML = "";
  if (!rows.length) {
    wrap.style.display = "none";
    empty.style.display = "";
    updateMarkers([]);
    return;
  }
  wrap.style.display = "";
  empty.style.display = "none";
  var sorted = rows.slice().sort(function(a, b) {
    if (sortBy === "prix") return a._p - b._p;
    return (a.ville || a.cp).localeCompare(b.ville || b.cp);
  });
  var minP = sorted[0]._p;
  updateMarkers(sorted);
  sorted.forEach(function(s) {
    var isBest = s._p === minP && sortBy === "prix";
    var tr = document.createElement("tr");
    if (isBest) tr.className = "best-deal";
    var mapsUrl = "https://www.google.com/maps/dir/" + encodeURIComponent(centreLabel) + "/" + s.lat + "," + s.lon;
    var badge = isBest ? "<span class=\"badge\">Meilleur prix</span> " : "";
    var adr = s.adresse ? "<div class=\"adr\">" + s.adresse + "</div>" : "";
    var pClass = "prix-val" + (isBest ? " lowest" : "");
    tr.innerHTML =
      "<td class=\"ville-cell\">" + badge + "<strong>" + (s.ville || s.cp) + "</strong> <span style=\"color:var(--muted);font-size:.78rem\">" + s.cp + "</span>" + adr + "</td>" +
      "<td><span class=\"" + pClass + "\">" + s._p.toFixed(3) + " &#8364;</span></td>" +
      "<td class=\"age\">" + fmtAge(s._age) + "</td>" +
      "<td><a class=\"maps-link\" href=\"" + mapsUrl + "\" target=\"_blank\" rel=\"noopener\">&#128205; Y aller</a></td>";
    (function(lat, lon) {
      tr.style.cursor = "pointer";
      tr.addEventListener("click", function(e) {
        if (e.target.tagName === "A") return;
        var key = lat + "," + lon;
        var m = markerIndex[key];
        if (m) {
          map.setView([lat, lon], 14, {animate: true});
          m.openPopup();
        }
      });
    })(s.lat, s.lon);
    tbody.appendChild(tr);
  });
}

function renderAll() {
  buildPills();
  var rows = getRows();
  renderStats(rows);
  renderTable(rows);
}

document.getElementById("rayon-slider").addEventListener("input", function(e) {
  rayonKm = parseInt(e.target.value);
  document.getElementById("rayon-label").textContent = rayonKm + " km";
  renderAll();
});

document.getElementById("sort-select").addEventListener("change", function(e) {
  sortBy = e.target.value;
  renderAll();
});

initMap();
setupVilleSearch();

fetch("data.json?" + Date.now())
  .then(function(r) { return r.json(); })
  .then(function(data) {
    allData = data;
    document.getElementById("loading").style.display = "none";
    var updEl = document.getElementById("updated");
    if (data.updated) {
      var d = new Date(data.updated);
      updEl.textContent = "Maj : " + d.toLocaleDateString("fr-FR") + " " + d.toLocaleTimeString("fr-FR", {hour:"2-digit", minute:"2-digit"});
    }
    renderAll();
  })
  .catch(function() {
    document.getElementById("loading").innerHTML = "<div class=\"state-msg\">Erreur de chargement.</div>";
  });
</script>
</body>
</html>
