name: Mise à jour des prix carburant
 
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
 
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Générer data.json
        run: python3 fetch_data.py
 
      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" > last_run.txt
          git add data.json last_run.txt
          git commit -m "chore: prix carburant $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
 
